name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (production)
        run: pnpm run vscode:prepublish

      - name: Verify output files
        run: |
          test -f dist/extension.js || (echo "dist/extension.js missing" && exit 1)
          test -f dist/webview.js   || (echo "dist/webview.js missing" && exit 1)

# The e2e suite (real bundle in headless Chromium) is a LOCAL pre-push gate,
# run with `pnpm test:e2e`, not a CI job. Its layout-geometry and input-timing
# assertions are calibrated to a real desktop browser and are flaky in GitHub's
# headless Chromium (sub-pixel font metrics, keystroke/selection races) — they
# pass locally on the same commit. A perpetually-red, non-blocking CI check is
# worse than none: it trains the one maintainer to ignore e2e, which is exactly
# where a real webview regression would hide. Run it locally before pushing
# webview changes (the /verify skill drives it); re-add a CI job only once the
# suite is stabilized against a pinned-font headless environment.
