<!doctype html>
<!-- e2e harness page for the frontmatter (metadata) panel. Mirrors the
     provider template (src/MarkdownEditorProvider.ts) with acquireVsCodeApi
     stubbed. The --vscode-* variables below stand in for the set VS Code
     injects natively; add any variable a new check depends on. -->
<meta charset="utf-8">
<style>
  :root {
    --vscode-editor-background: #1e1e1e;
    --vscode-editor-foreground: #d4d4d4;
    --vscode-foreground: #cccccc;
    --vscode-descriptionForeground: #999999;
    --vscode-editorWidget-background: #252526;
    --vscode-editorWidget-border: #454545;
    --vscode-input-background: #3c3c3c;
    --vscode-input-foreground: #cccccc;
    --vscode-input-placeholderForeground: #888888;
    --vscode-focusBorder: #007fd4;
    --vscode-editor-selectionBackground: #264f78;
    --vscode-toolbar-hoverBackground: rgba(90, 93, 94, 0.31);
    --vscode-panel-border: rgba(128, 128, 128, 0.2);
    --vscode-errorForeground: #f48771;
    --vscode-symbolIcon-keywordForeground: #c586c0;
    --vscode-textBlockQuote-background: rgba(128, 128, 128, 0.08);
  }
  body { background: var(--vscode-editor-background); color: var(--vscode-editor-foreground); }
</style>
<script>
  window.__i18n = { translations: {}, isMac: true, toolbar: { placements: {}, order: [] } };
  window.__posted = [];
  const CONTENT = "---\ntitle: Content inventory\ntags:\n  - reference\n  - showcase\n---\n\n# Sample\n\ntext\n";
  const FRONTMATTER = "---\ntitle: Content inventory\ntags:\n  - reference\n  - showcase\n---\n";
  window.acquireVsCodeApi = () => ({
    postMessage: (msg) => {
      window.__posted.push(msg);
      if (msg.type === "ready") {
        window.postMessage({
          type: "init",
          content: CONTENT,
          frontmatter: FRONTMATTER,
          syncVersion: 1,
        }, "*");
      }
    },
    getState: () => undefined,
    setState: () => {},
  });
</script>
<link rel="stylesheet" href="dist/webview.css">
<div class="editor-topbar"></div>
<div id="editor"></div>
<script type="module" src="dist/webview.js"></script>
