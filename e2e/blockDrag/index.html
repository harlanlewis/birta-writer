<!doctype html>
<!-- e2e harness: gutter drag-to-reorder (MAR-19). Mirrors the provider
     template with acquireVsCodeApi stubbed; same skeleton as paragraphGutter. -->
<meta charset="utf-8">
<style>
  :root {
    --vscode-editor-background: #1e1e1e; --vscode-editor-foreground: #d4d4d4;
    --vscode-foreground: #cccccc; --vscode-descriptionForeground: #999999;
    --vscode-editor-font-family: monospace; --vscode-font-family: -apple-system, sans-serif; --vscode-font-size: 13px;
    --vscode-editorHoverWidget-background: #252526; --vscode-editorHoverWidget-foreground: #cccccc;
    --vscode-editorHoverWidget-border: #454545; --vscode-focusBorder: #007fd4;
    --vscode-toolbar-hoverBackground: rgba(90,93,94,0.31); --vscode-list-hoverBackground: #2a2d2e;
    --vscode-editor-selectionBackground: #264f78;
    --vscode-button-background: #0e639c; --vscode-button-foreground: #ffffff; --vscode-button-hoverBackground: #1177bb;
    --vscode-button-secondaryBackground: #3a3d41; --vscode-panel-border: #454545;
  }
  body { background: var(--vscode-editor-background); color: var(--vscode-editor-foreground); }
  /* Real toolbar height (~40px in VS Code at default font) so the measured
     --editor-topbar-height, and everything laid out from it, matches production.
     This suite's scroll steps park content under the bar and click gutter
     markers there (written against the old unstyled ~11px bar), so the bar is
     click-through here — height realism without re-tuning every coordinate. */
  .editor-topbar { height: 40px; box-sizing: border-box; pointer-events: none; }
</style>
<script>
  window.__i18n = { translations: {}, isMac: true, toolbar: { placements: {}, order: [] } };
  window.__posted = [];
  const DOC = [
    "Alpha paragraph.",
    "",
    "- item one",
    "- item two",
    "",
    "Omega paragraph.",
    "",
    "# Section A",
    "",
    "content of A",
    "",
    "# Section B",
    "",
    "content of B",
    "",
    "drag me last",
    "",
    "> [!tip] L1",
    "> > [!tip] L2",
    "> > > [!tip] L3",
    "> > > > [!tip]- L4",
    "> > > > deep content",
    "",
  ].join("\n");
  window.acquireVsCodeApi = () => ({
    postMessage: (msg) => {
      window.__posted.push(msg);
      if (msg.type === "ready")
        window.postMessage({ type: "init", content: DOC + "\n", syncVersion: 1 }, "*");
    },
    getState: () => undefined, setState: () => {},
  });
</script>
<link rel="stylesheet" href="dist/webview.css">
<div class="editor-topbar"></div>
<div id="editor"></div>
<script type="module" src="dist/webview.js"></script>
