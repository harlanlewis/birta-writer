<!doctype html>
<!-- e2e harness for the MAR-188 review sidebar (Contents / Proofreading / Notes
     tabs). Mirrors the provider template with acquireVsCodeApi stubbed. The
     document carries 4 headings (> tocAutoHideThreshold) so the panel auto-opens
     docked at the 1000px runner viewport (editor-width-auto makes docked a pure
     width test). It also carries every built-in note marker ([TK], TODO:, an
     unchecked + a checked checkbox, an HTML comment) and a style-check filler
     ("really") so the Proofreading tab has a finding without Harper (which needs
     the extension host and is off here, exactly as e2e/proofread does). -->
<meta charset="utf-8">
<style>
  :root {
    --vscode-editor-background: #1e1e1e;
    --vscode-editor-foreground: #d4d4d4;
    --vscode-foreground: #cccccc;
    --vscode-descriptionForeground: #999999;
    --vscode-focusBorder: #007fd4;
    --vscode-panel-border: rgba(128, 128, 128, 0.2);
    --vscode-symbolIcon-keywordForeground: #c586c0;
    --vscode-input-placeholderForeground: #888888;
    --vscode-icon-foreground: #cccccc;
    --vscode-toolbar-hoverBackground: rgba(90, 93, 94, 0.31);
    --vscode-list-hoverBackground: rgba(90, 93, 94, 0.2);
    --vscode-list-activeSelectionBackground: rgba(0, 127, 212, 0.26);
    --vscode-list-activeSelectionForeground: #ffffff;
    --vscode-editor-selectionBackground: #264f78;
    --vscode-editorWidget-background: #252526;
    --vscode-editorWidget-foreground: #cccccc;
    --vscode-editorWidget-border: #454545;
    --vscode-widget-shadow: rgba(0, 0, 0, 0.36);
    --vscode-keybindingLabel-background: rgba(128, 128, 128, 0.17);
    --vscode-keybindingLabel-foreground: #cccccc;
    --vscode-keybindingLabel-border: rgba(51, 51, 51, 0.6);
    --vscode-keybindingLabel-bottomBorder: rgba(68, 68, 68, 0.6);
    --vscode-button-background: #0e639c;
    --vscode-button-foreground: #ffffff;
    --vscode-textLink-foreground: #3794ff;
  }
  body { background: var(--vscode-editor-background); color: var(--vscode-editor-foreground); margin: 0; }
  .editor-topbar { height: 40px; }
</style>
<script>
  document.addEventListener("DOMContentLoaded", () => document.body.classList.add("editor-width-auto"));
  window.__i18n = {
    translations: {},
    isMac: true,
    toolbar: { placements: {}, order: [] },
    tocAutoHideThreshold: 3,
    // Harper (grammar/spell) needs the extension host, absent here; style checks
    // still run, so the filler "really" yields a Proofreading finding.
    proofread: { grammarCheck: false, spellCheck: false },
  };
  window.__posted = [];
  const CONTENT = [
    "# Intro",
    "",
    "This is really good work. [TK]",
    "",
    "## Background",
    "",
    "TODO: write the background section",
    "",
    "- [ ] gather sources",
    "- [x] outline done",
    "",
    "<!-- FIXME: revisit the framing -->",
    "",
    "## Method",
    "",
    "The plan is simple — ship it. This is really very good, just fine actually.",
    "",
    "Another dash here — and one more — for the group to have several rows.",
    "",
    "Dashes — everywhere — in — this — line — for — testing — the — cap — here.",
    "",
    "## Links",
    "",
    "An [inline link](https://example.com) and a bare <https://autolink.dev>.",
    "",
    "A [local file](/README), a [heading](#intro), and a [[wiki page]].",
    "",
    "## Results",
    "",
    "Results go here.",
    "",
  ].join("\n");
  window.acquireVsCodeApi = () => ({
    postMessage: (msg) => {
      window.__posted.push(msg);
      if (msg.type === "ready") {
        window.postMessage({ type: "init", content: CONTENT, frontmatter: "", syncVersion: 1 }, "*");
      }
    },
    getState: () => undefined,
    setState: () => {},
  });
</script>
<link rel="stylesheet" href="dist/webview.css">
<div class="editor-topbar"></div>
<div id="editor"></div>
<script type="module" src="dist/webview.js"></script>
