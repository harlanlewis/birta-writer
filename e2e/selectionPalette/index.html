<!doctype html>
<!-- e2e harness for the floating selection palette. Mirrors the provider
     template (src/MarkdownEditorProvider.ts) with acquireVsCodeApi stubbed;
     same shape as e2e/pasteLink/index.html. -->
<meta charset="utf-8">
<style>
  :root {
    --vscode-editor-background: #1e1e1e;
    --vscode-editor-foreground: #d4d4d4;
    --vscode-foreground: #cccccc;
    --vscode-descriptionForeground: #999999;
    --vscode-editorWidget-background: #252526;
    --vscode-editorWidget-border: #454545;
    --vscode-editorHoverWidget-background: #252526;
    --vscode-editorHoverWidget-border: #454545;
    --vscode-editorHoverWidget-foreground: #cccccc;
    --vscode-input-background: #3c3c3c;
    --vscode-input-foreground: #cccccc;
    --vscode-inputOption-activeBackground: rgba(14, 99, 156, 0.4);
    --vscode-inputOption-activeForeground: #ffffff;
    --vscode-focusBorder: #007fd4;
    --vscode-editor-selectionBackground: #264f78;
    --vscode-toolbar-hoverBackground: rgba(90, 93, 94, 0.31);
    --vscode-list-hoverBackground: rgba(90, 93, 94, 0.31);
    --vscode-panel-border: rgba(128, 128, 128, 0.2);
    --vscode-widget-shadow: rgba(0, 0, 0, 0.36);
    --vscode-errorForeground: #f48771;
  }
  body { background: var(--vscode-editor-background); color: var(--vscode-editor-foreground); }
  /* Real toolbar height (~40px in VS Code at default font) so the measured
     --editor-topbar-height, and everything laid out from it, matches production. */
  .editor-topbar { height: 40px; box-sizing: border-box; }
</style>
<script>
  window.__i18n = { translations: {}, isMac: true, toolbar: { placements: {}, order: [] } };
  window.__posted = [];
  window.acquireVsCodeApi = () => ({
    postMessage: (msg) => {
      window.__posted.push(msg);
      if (msg.type === "ready") {
        window.postMessage({
          type: "init",
          content: "# Heading one\n\nThis **bold** and plain words here.\n",
          syncVersion: 1,
        }, "*");
      }
    },
    getState: () => undefined,
    setState: () => {},
  });
</script>
<link rel="stylesheet" href="dist/webview.css">
<!-- Light VS Code theme, so the palette's light-only inversion applies (the
     checks toggle to vscode-dark to prove dark themes are not inverted). -->
<body class="vscode-light">
<div class="editor-topbar"></div>
<div id="editor"></div>
<script type="module" src="dist/webview.js"></script>
