<!doctype html>
<!-- e2e harness: the Apple Notes editing set, driven in the real bundle —
     inline calc (both = forms, auto-insert guards), the lazy section-link
     picker, #heading anchors in the link editor, checklist sink + Uncheck All,
     and embeds staying dark with the network master switch off. The fixture
     carries two headings (picker/anchor rows), a task list (sink), prose
     (calc lines are typed live), and a bare YouTube link (embed gating). -->
<meta charset="utf-8">
<style>
  :root {
    --vscode-editor-background: #1e1e1e; --vscode-editor-foreground: #d4d4d4;
    --vscode-foreground: #cccccc; --vscode-descriptionForeground: #999999;
    --vscode-editor-font-family: monospace; --vscode-font-family: -apple-system, sans-serif; --vscode-font-size: 13px;
    --vscode-editorWidget-background: #252526; --vscode-editorWidget-border: #454545;
    --vscode-focusBorder: #007fd4; --vscode-list-hoverBackground: #2a2d2e;
    --vscode-list-activeSelectionBackground: #094771; --vscode-list-activeSelectionForeground: #ffffff;
    --vscode-input-background: #3c3c3c; --vscode-input-foreground: #cccccc;
    --vscode-textLink-foreground: #3794ff; --vscode-panel-border: rgba(128, 128, 128, 0.2);
    --vscode-editor-selectionBackground: #264f78; --vscode-icon-foreground: #cccccc;
  }
  body { background: var(--vscode-editor-background); color: var(--vscode-editor-foreground); margin: 0; }
  /* Real toolbar height (~40px in VS Code at default font) so the measured
     --editor-topbar-height, and everything laid out from it, matches production. */
  .editor-topbar { height: 40px; box-sizing: border-box; }
</style>
<script>
  window.__i18n = {
    translations: {}, isMac: true,
    toolbar: { placements: {}, order: [] },
    calcEnabled: true, calcAutoInsert: false,
    checklistSinkChecked: true,
    network: false, embedsEnabled: true,
    pasteUnfurl: true,
    autoUpdateAnchors: true,
  };
  window.__posted = [];
  const DOC = [
    "# Alpha",
    "",
    "some text",
    "",
    "## Beta",
    "",
    "- [ ] a",
    "- [ ] b",
    "- [x] c",
    "",
    "https://youtu.be/dQw4w9WgXcQ",
    "",
  ].join("\n");
  window.acquireVsCodeApi = () => ({
    postMessage: (msg) => {
      window.__posted.push(msg);
      if (msg.type === "ready")
        window.postMessage({ type: "init", content: DOC + "\n", frontmatter: "", syncVersion: 1 }, "*");
    },
    getState: () => undefined,
    setState: () => {},
  });
</script>
<link rel="stylesheet" href="dist/webview.css">
<div class="editor-topbar"></div>
<div id="editor"></div>
<script type="module" src="dist/webview.js"></script>
