<!doctype html>
<!-- e2e harness page for the content-width segmented control in the typography
     (A) menu. Mirrors the provider template (src/MarkdownEditorProvider.ts)
     with acquireVsCodeApi stubbed. -->
<meta charset="utf-8">
<style>
  :root {
    /* Distinct UI vs content fonts so a ch-based cap resolves differently on
       the frontmatter panel (UI font) than #editor (content font) unless the
       panel is aligned to the content font — which is what we assert below. */
    --vscode-font-family: Arial, Helvetica, sans-serif;
    --vscode-editor-font-family: "Courier New", Courier, monospace;
    --content-font-family: "Courier New", Courier, monospace;
    --vscode-editor-font-size: 14px;
    --vscode-font-size: 13px;
    --vscode-editor-background: #1e1e1e;
    --vscode-editor-foreground: #d4d4d4;
    --vscode-foreground: #cccccc;
    --vscode-descriptionForeground: #999999;
    --vscode-editorHoverWidget-background: #252526;
    --vscode-editorHoverWidget-foreground: #cccccc;
    --vscode-editorHoverWidget-border: #454545;
    --vscode-list-hoverBackground: rgba(255, 255, 255, 0.08);
    --vscode-focusBorder: #007fd4;
    --vscode-button-background: #0e639c;
    --vscode-button-foreground: #ffffff;
    --vscode-button-hoverBackground: #1177bb;
    --vscode-button-secondaryBackground: #3a3d41;
  }
  body { background: var(--vscode-editor-background); color: var(--vscode-editor-foreground); }
</style>
<script>
  window.__i18n = {
    translations: {},
    isMac: true,
    toolbar: { placements: {}, order: [] },
    fontPreset: "editor",
    fontSize: 100,
    contentWidth: "full",
    maxContentWidth: 100,
    frontmatterExpanded: true,
  };
  window.__posted = [];
  window.acquireVsCodeApi = () => ({
    postMessage: (msg) => {
      window.__posted.push(msg);
      if (msg.type === "ready") {
        window.postMessage({
          type: "init",
          content: "# Sample\n\nThe quick brown fox jumps over.\n",
          frontmatter: "---\ntitle: Test document\ntags: [alpha, beta]\n---\n",
          syncVersion: 1,
        }, "*");
      }
    },
    getState: () => undefined,
    setState: () => {},
  });
</script>
<link rel="stylesheet" href="dist/webview.css">
<div class="editor-topbar"></div>
<div id="editor"></div>
<script type="module" src="dist/webview.js"></script>
