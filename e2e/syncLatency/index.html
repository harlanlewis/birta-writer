<!doctype html>
<!-- e2e harness page for the view→document sync latency contract (MAR-145).
     Mirrors the provider template (src/MarkdownEditorProvider.ts) with
     acquireVsCodeApi stubbed. Every outbound message is timestamped as it is
     posted, so checks.mjs can measure the gap between a keystroke and the
     `update` that dirties the TextDocument — the mechanism CLAUDE.md's sync
     invariant #2 rests on. -->
<meta charset="utf-8">
<style>
  :root {
    --vscode-editor-background: #1e1e1e;
    --vscode-editor-foreground: #d4d4d4;
    --vscode-foreground: #cccccc;
    --vscode-descriptionForeground: #999999;
    --vscode-focusBorder: #007fd4;
    --vscode-panel-border: rgba(128, 128, 128, 0.2);
    --vscode-input-placeholderForeground: #888888;
    --vscode-icon-foreground: #cccccc;
  }
  body { background: var(--vscode-editor-background); color: var(--vscode-editor-foreground); margin: 0; }
  .editor-topbar { height: 40px; }
</style>
<script>
  window.__i18n = { translations: {}, isMac: true, toolbar: { placements: {}, order: [] }, tocAutoHideThreshold: 99 };
  // Every post is stamped with performance.now() at the moment the webview
  // hands it to the host — the observable the latency contract is written on.
  window.__posted = [];
  const CONTENT = "# Title\n\nsome text\n";
  window.acquireVsCodeApi = () => ({
    postMessage: (msg) => {
      window.__posted.push({ ...msg, __t: performance.now() });
      if (msg.type === "ready") {
        window.postMessage({ type: "init", content: CONTENT, frontmatter: "", syncVersion: 1 }, "*");
      }
    },
    getState: () => undefined,
    setState: () => {},
  });
</script>
<link rel="stylesheet" href="dist/webview.css">
<div class="editor-topbar"></div>
<div id="editor"></div>
<script type="module" src="dist/webview.js"></script>
